{% extends "base.html" %}
{% block title %}Edit Customer — InsureTrack{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-pencil-square me-2"></i>Edit Customer</h1>
  <p class="text-muted mb-0">Update customer ID {{ customer[0] }}.</p>
</div>

<form method="POST">
  <div class="card p-4">
    <h5 class="mb-3">Customer Information</h5>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">First Name *</label>
        <input name="first_name" class="form-control" value="{{ customer[1] }}" required />
      </div>
      <div class="col-md-4">
        <label class="form-label">Last Name *</label>
        <input name="last_name" class="form-control" value="{{ customer[2] }}" required />
      </div>
      <div class="col-md-4">
        <label class="form-label">Date of Birth *</label>
        <input name="dob" type="date" class="form-control" value="{{ customer[5]|string|truncate(10, True, '') }}" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Email *</label>
        <input name="email" type="email" class="form-control" value="{{ customer[3] }}" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone *</label>
        <input name="phone" class="form-control" value="{{ customer[4] }}" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Street *</label>
        <input name="street" class="form-control" value="{{ customer[6] }}" required />
      </div>
      <div class="col-md-3">
        <label class="form-label">City *</label>
        <input name="city" class="form-control" value="{{ customer[7] }}" required />
      </div>
      <div class="col-md-1">
        <label class="form-label">State *</label>
        <input name="state" class="form-control" maxlength="2" value="{{ customer[8] }}" required />
      </div>
      <div class="col-md-2">
        <label class="form-label">Postal Code *</label>
        <input name="postal_code" class="form-control" value="{{ customer[9] }}" required />
      </div>
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <button type="submit" class="btn btn-primary px-4">
      <i class="bi bi-check-lg me-1"></i> Save Changes
    </button>
    <a href="{{ url_for('customers_list') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
